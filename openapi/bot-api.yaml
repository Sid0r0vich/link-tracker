openapi: 3.0.3
info:
  title: Bot API
  version: 1.0.0
  contact:
    name: Alexander Biryukov
    url: https://github.com
paths:
  /updates:
    post:
      summary: Отправить обновление
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateResponse'
        required: true
      responses:
        '200':
          description: Обновление обработано
        '400':
          description: Некорректные параметры запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
components:
  schemas:
    ApiErrorResponse:
      type: object
      properties:
        description:
          type: string
        code:
          type: string
        exceptionName:
          type: string
        exceptionMessage:
          type: string
        stacktrace:
          type: array
          items:
            type: string
    UpdateResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        url:
          type: string
          format: uri
        tgChatIds:
          type: array
          items:
            type: integer
            format: int64
        data:
          type: array
          items:
            $ref: '#/components/schemas/Event'
      required:
        - id
        - url
        - tgChatIds
        - data
    Event:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        description:
          type: string
        username:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - type
        - title
        - description
        - username
        - createdAt