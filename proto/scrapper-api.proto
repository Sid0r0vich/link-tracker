syntax = "proto3";

package scrapper;

option go_package = "internal/api/rpc/rpc";

import "google/protobuf/empty.proto";

message RegisterChatRequest {
  int64 id = 1;
}

message DeleteChatRequest {
  int64 id = 1;
}

message GetLinksRequest {
  int64 tg_chat_id = 1;
}

message ListLinksResponse {
  repeated LinkResponse links = 1;
  int32 size = 2;
}

message AddLinkRequest {
  int64 tg_chat_id = 1;
  string url = 2;
  repeated string tags = 3;
  repeated string filters = 4;
}

message RemoveLinkRequest {
  int64 tg_chat_id = 1;
  string link = 2;
}

message ApiErrorResponse {
  string description = 1;
  string code = 2;
  string exceptionName = 3;
  string exceptionMessage = 4;
  repeated string stacktrace = 5;
}

message LinkResponse {
  int64 id = 1;
  string url = 2;
  repeated string tags = 3;
  repeated string filters = 4;
}

service ScrapperAPI {
  rpc RegisterChat (RegisterChatRequest) returns (google.protobuf.Empty);
  rpc DeleteChat (DeleteChatRequest) returns (google.protobuf.Empty);
  rpc GetLinks (GetLinksRequest) returns (ListLinksResponse);
  rpc AddLink (AddLinkRequest) returns (LinkResponse);
  rpc RemoveLink (RemoveLinkRequest) returns (LinkResponse);
}