services:
  scrapper:
    image: sid00r/link-tracker-scrapper:latest
    build: 
      context: .
      dockerfile: ./docker/scrapper/Dockerfile
    container_name: link-tracker-scrapper
    env_file:
      - .env
    ports:
      - "1234:1234"
    networks:
      - markdown
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy

  bot:
    image: sid00r/link-tracker-bot:latest
    build: 
      context: .
      dockerfile: ./docker/bot/Dockerfile
    container_name: link-tracker-bot
    env_file:
      - .env
    ports:
      - "1235:1235"
    networks:
      - markdown
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy

  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: $POSTGRES_USER
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
      POSTGRES_DB: $POSTGRES_DB
    ports:
      - "5432:5432"
    networks:
      - markdown
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: ["postgres", "-c", "log_statement=all"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrations:
    image: liquibase/liquibase:4.29
    depends_on:
      - db
    command:
      - --searchPath=/changesets
      - --changelog-file=master.xml
      - --driver=org.postgresql.Driver
      - --url=jdbc:postgresql://db:5432/$POSTGRES_DB
      - --username=$POSTGRES_USER
      - --password=$POSTGRES_PASSWORD
      - update
    volumes:
      - ./db/migrations:/changesets
    networks:
      - markdown

  kafka:
    image: docker.io/bitnamilegacy/kafka:latest
    container_name: kafka
    ports:
      - "9094:9094"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: "broker, controller"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"

      KAFKA_CFG_LISTENERS: "BROKER://:9094,CONTROLLER://:9093"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "BROKER:PLAINTEXT,CONTROLLER:PLAINTEXT"
      
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "BROKER"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_ADVERTISED_LISTENERS: "BROKER://kafka:9094"
    networks:
      - markdown
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server kafka:9094 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 10s

networks:
  markdown:
    driver: bridge

volumes:
  pgdata:
