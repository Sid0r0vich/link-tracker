services:
  scrapper:
    image: sid00r/link-tracker-scrapper:latest
    build: 
      context: .
      dockerfile: ./docker/scrapper/Dockerfile
    container_name: link-tracker-scrapper
    environment:
      - SCRAPPER_SERVER_ADDR=$SCRAPPER_SERVER_ADDR
      - BOT_SERVER_ADDR=$BOT_SERVER_ADDR
      - CONFIG_FILE=$CONFIG_FILE
    ports:
      - "1234:1234"
    networks:
      - markdown-network
    restart: unless-stopped
    depends_on:
      - db

  bot:
    image: sid00r/link-tracker-bot:latest
    build: 
      context: .
      dockerfile: ./docker/bot/Dockerfile
    container_name: link-tracker-bot
    environment:
      - SCRAPPER_SERVER_ADDR=$SCRAPPER_SERVER_ADDR
      - BOT_SERVER_ADDR=$BOT_SERVER_ADDR
      - CONFIG_FILE=$CONFIG_FILE
    ports:
      - "1235:1235"
    networks:
      - markdown-network
    restart: unless-stopped

  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: $APP_POSTGRES_USER
      POSTGRES_PASSWORD: $APP_POSTGRES_PASSWORD
      POSTGRES_DB: $APP_POSTGRES_DB
    ports:
      - "5432:5432"
    networks:
      - markdown-network
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: ["postgres", "-c", "log_statement=all"]

networks:
  markdown-network:
    driver: bridge

volumes:
  pgdata: