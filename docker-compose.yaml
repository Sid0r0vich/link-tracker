services:
  scrapper:
    image: sid00r/link-tracker-scrapper:latest
    build: 
      context: .
      dockerfile: ./docker/scrapper/Dockerfile
    container_name: link-tracker-scrapper
    env_file:
      - .env
    environment:
      CONFIG_FILE: /config/config.yaml
    ports:
      - "1234:1234"
    volumes:
      - ./config.yaml:/config/config.yaml:ro
    networks:
      - markdown
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/ready"]
      interval: 2s
      timeout: 30s
      retries: 10

  bot:
    image: sid00r/link-tracker-bot:latest
    build: 
      context: .
      dockerfile: ./docker/bot/Dockerfile
    container_name: link-tracker-bot
    env_file:
      - .env
    environment:
      CONFIG_FILE: /config/config.yaml
    volumes:
      - ./config.yaml:/config/config.yaml:ro
    networks:
      - markdown
    restart: unless-stopped
    depends_on:
      scrapper:
        condition: service_healthy
      agent:
        condition: service_started
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy

  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: $POSTGRES_USER
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
      POSTGRES_DB: $POSTGRES_DB
    ports:
      - "5432:5432"
    networks:
      - markdown
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: ["postgres", "-c", "log_statement=all"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrations:
    image: liquibase/liquibase:4.29
    depends_on:
      - db
    command:
      - --searchPath=/changesets
      - --changelog-file=master.xml
      - --driver=org.postgresql.Driver
      - --url=jdbc:postgresql://db:5432/$POSTGRES_DB
      - --username=$POSTGRES_USER
      - --password=$POSTGRES_PASSWORD
      - update
    volumes:
      - ./db/migrations:/changesets
    networks:
      - markdown

  kafka-1:
    image: docker.io/bitnamilegacy/kafka:latest
    environment:
      KAFKA_CLUSTER_ID: 0
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: "broker, controller"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka-1:9093,1@kafka-2:9093,2@kafka-3:9093"
      KAFKA_CFG_LISTENERS: "BROKER://:9094,CONTROLLER://:9093"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "BROKER:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "BROKER"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_ADVERTISED_LISTENERS: "BROKER://kafka-1:9094"
    networks:
      - markdown
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server kafka-1:9094 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 10s

  kafka-2:
    image: docker.io/bitnamilegacy/kafka:latest
    environment:
      KAFKA_CLUSTER_ID: 0
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: "broker, controller"
      KAFKA_CFG_LISTENERS: "BROKER://:9094,CONTROLLER://:9093"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "BROKER:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "BROKER"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_ADVERTISED_LISTENERS: "BROKER://kafka-2:9094"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka-1:9093,1@kafka-2:9093,2@kafka-3:9093"
    networks:
      - markdown
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server kafka-2:9094 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 10s

  kafka-3:
    image: docker.io/bitnamilegacy/kafka:latest
    environment:
      KAFKA_CLUSTER_ID: 0
      KAFKA_CFG_NODE_ID: 2
      KAFKA_CFG_PROCESS_ROLES: "broker, controller"
      KAFKA_CFG_LISTENERS: "BROKER://:9094,CONTROLLER://:9093"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "BROKER:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "BROKER"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_ADVERTISED_LISTENERS: "BROKER://kafka-3:9094"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka-1:9093,1@kafka-2:9093,2@kafka-3:9093"
    networks:
      - markdown
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server kafka-3:9094 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 10s

  valkey-1:
    image: bitnami/valkey:latest
    environment:
      - VALKEY_PASSWORD=$VALKEY_PASSWORD
    networks:
      - markdown
    volumes:
      - valkey-1-data:/bitnami/valkey
    command: >
      valkey-server
      --port 7000
      --dir /bitnami/valkey
      --protected-mode no
      --requirepass ${VALKEY_PASSWORD}
      --masterauth ${VALKEY_PASSWORD}
      --cluster-enabled yes
      --cluster-config-file /bitnami/valkey/nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --cluster-announce-ip valkey-1
      --cluster-announce-port 7000
      --cluster-announce-bus-port 17000
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli -a \"$VALKEY_PASSWORD\" -p 7000 ping >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 30

  valkey-2:
    image: bitnami/valkey:latest
    environment:
      - VALKEY_PASSWORD=$VALKEY_PASSWORD
    networks:
      - markdown
    volumes:
      - valkey-2-data:/bitnami/valkey
    command: >
      valkey-server
      --port 7001
      --dir /bitnami/valkey
      --protected-mode no
      --requirepass ${VALKEY_PASSWORD}
      --masterauth ${VALKEY_PASSWORD}
      --cluster-enabled yes
      --cluster-config-file /bitnami/valkey/nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --cluster-announce-ip valkey-2
      --cluster-announce-port 7001
      --cluster-announce-bus-port 17001
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli -a \"$VALKEY_PASSWORD\" -p 7001 ping >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 30

  valkey-3:
    image: bitnami/valkey:latest
    environment:
      - VALKEY_PASSWORD=$VALKEY_PASSWORD
    networks:
      - markdown
    volumes:
      - valkey-3-data:/bitnami/valkey
    command: >
      valkey-server
      --port 7002
      --dir /bitnami/valkey
      --protected-mode no
      --requirepass ${VALKEY_PASSWORD}
      --masterauth ${VALKEY_PASSWORD}
      --cluster-enabled yes
      --cluster-config-file /bitnami/valkey/nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --cluster-announce-ip valkey-3
      --cluster-announce-port 7002
      --cluster-announce-bus-port 17002
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli -a \"$VALKEY_PASSWORD\" -p 7002 ping >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 30

  valkey-init:
    image: bitnami/valkey:latest
    environment:
      - VALKEY_PASSWORD=$VALKEY_PASSWORD
    entrypoint: >
      sh -c "
        sleep 5;
        valkey-cli -a \"$VALKEY_PASSWORD\" --cluster create valkey-1:7000 valkey-2:7001 valkey-3:7002 --cluster-replicas 0 --cluster-yes;
      "
    networks:
      - markdown
    depends_on:
      valkey-1:
        condition: service_healthy
      valkey-2:
        condition: service_healthy
      valkey-3:
        condition: service_healthy

  agent:
    image: sid00r/link-tracker-agent:latest
    build: 
      context: .
      dockerfile: ./docker/agent/Dockerfile
    container_name: link-tracker-agent
    env_file:
      - .env
    environment:
      CONFIG_FILE: /config/config.yaml
    volumes:
      - ./config.yaml:/config/config.yaml:ro
    networks:
      - markdown
    restart: unless-stopped
    depends_on:
      scrapper:
        condition: service_healthy

networks:
  markdown:
    driver: bridge

volumes:
  pgdata:
  valkey-1-data:
  valkey-2-data:
  valkey-3-data:
